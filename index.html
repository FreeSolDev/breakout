<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>BREAKOUT</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a18">
  <meta name="description" content="Pixel art beat-em-up roguelike">

  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BREAKOUT">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Windows tile -->
  <meta name="msapplication-TileColor" content="#0a0a18">
  <meta name="msapplication-TileImage" content="icons/icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; touch-action: none; }
    #game-wrap { position: relative; }
    #game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <canvas id="hud-overlay"></canvas>
  </div>
  <script src="wallet.js"></script>
  <script type="module" src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('[SW] registered, scope:', reg.scope))
        .catch(err => console.warn('[SW] registration failed:', err));
    }

    // Version check — runs entirely in page JS, no SW dependency
    async function checkForUpdate() {
      try {
        const remote = await fetch('https://breakout.proofnetwork.lol/version.json?t=' + Date.now()).then(r => r.json());
        const local = await fetch('./version.json').then(r => r.json());
        console.log('[Update] local:', local.version, 'remote:', remote.version);
        if (remote.version > local.version) {
          // Purge SW caches
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
          // Show update overlay then reload
          const overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:99999;';
          const style = document.createElement('style');
          style.textContent = '@keyframes sw-spin{to{transform:rotate(360deg)}}';
          document.head.appendChild(style);
          const spinner = document.createElement('div');
          spinner.style.cssText = 'width:40px;height:40px;border:3px solid rgba(255,255,255,0.15);border-top-color:#fff;border-radius:50%;margin-bottom:18px;animation:sw-spin 0.8s linear infinite;';
          const msg = document.createElement('div');
          msg.style.cssText = 'color:#fff;font-family:monospace;font-size:14px;letter-spacing:1px;';
          msg.textContent = 'Update found, updating...';
          overlay.appendChild(spinner);
          overlay.appendChild(msg);
          document.body.appendChild(overlay);
          setTimeout(() => location.reload(), 1500);
        }
      } catch (e) { /* offline or error — skip */ }
    }
    // Check on load + every 5 minutes
    checkForUpdate();
    setInterval(checkForUpdate, 5 * 60 * 1000);
  </script>
</body>
</html>
