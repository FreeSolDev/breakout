<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>BREAKOUT</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a18">
  <meta name="description" content="Pixel art beat-em-up roguelike">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BREAKOUT">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Windows tile -->
  <meta name="msapplication-TileColor" content="#0a0a18">
  <meta name="msapplication-TileImage" content="icons/icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; touch-action: none; }
    #game-wrap { position: relative; }
    #game {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <canvas id="hud-overlay"></canvas>
  </div>
  <script src="wallet.js"></script>
  <script type="module" src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] registered, scope:', reg.scope))
          .catch(err => console.warn('[SW] registration failed:', err));
      });
    }
  </script>
</body>
</html>
